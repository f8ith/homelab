networks:
  web:
    name: web
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.90.0/24
  internal:
    name: internal
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.91.0/24

secrets:
  cf_dns_api_token:
    file: $DATADIR/secrets/cf_dns_api_token

include:
  - compose/common/socket-proxy/compose.yml
  - compose/${DOCKER_HOST_NAME}/alloy/compose.yml
  - compose/${DOCKER_HOST_NAME}/traefik/compose.yml
  - compose/${DOCKER_HOST_NAME}/jellyfin/compose.yml
  - compose/${DOCKER_HOST_NAME}/arr/compose.yml
  - compose/${DOCKER_HOST_NAME}/immich/compose.yml
  - compose/${DOCKER_HOST_NAME}/qbittorrent/compose.yml
  - compose/${DOCKER_HOST_NAME}/recyclarr/compose.yml
  - compose/${DOCKER_HOST_NAME}/kavita/compose.yml
  - compose/${DOCKER_HOST_NAME}/tachidesk/compose.yml
  - compose/${DOCKER_HOST_NAME}/slskd/compose.yml
  - compose/${DOCKER_HOST_NAME}/beets-flask/compose.yml
  - compose/${DOCKER_HOST_NAME}/lms/compose.yml
  - compose/${DOCKER_HOST_NAME}/grafana-monitoring/compose.yml
  - compose/${DOCKER_HOST_NAME}/audiobookshelf/compose.yml
  - compose/${DOCKER_HOST_NAME}/paperless-ngx/compose.yml
  - compose/${DOCKER_HOST_NAME}/navidrome/compose.yml
  - compose/${DOCKER_HOST_NAME}/homeassistant/compose.yml
