[[stack]]
name = "paperless-ngx"

[stack.config]
server = "gamma"
run_directory = "compose/gamma/paperless-ngx"
linked_repo = "homelab"
file_paths = [ "compose.yml" ]
environment = """
###############################################################################
# Paperless-ngx settings                                                      #
###############################################################################

# See http://docs.paperless-ngx.com/configuration/ for all available options.

# The UID and GID of the user used to run paperless in the container. Set this
# to your UID and GID on the host so that you have write access to the
# consumption directory.
USERMAP_UID=1000
USERMAP_GID=1000

# See the documentation linked above for all options. A few commonly adjusted settings
# are provided below.

# This is required if you will be exposing Paperless-ngx on a public domain
# (if doing so please consider security measures such as reverse proxy)
PAPERLESS_URL=https://paperless.jamietong.com

# Adjust this key if you plan to make paperless available publicly. It should
# be a very long sequence of random characters. You don't need to remember it.
#PAPERLESS_SECRET_KEY=change-me

# Use this variable to set a timezone for the Paperless Docker containers. Defaults to UTC.
PAPERLESS_TIME_ZONE=Asia/Hong_Kong

# The default language to use for OCR. Set this to the language most of your
# documents are written in.
PAPERLESS_OCR_LANGUAGE=eng+chi_tra

# Additional languages to install for text recognition, separated by a whitespace.
# Note that this is different from PAPERLESS_OCR_LANGUAGE (default=eng), which defines
# the language used for OCR.
# The container installs English, German, Italian, Spanish and French by default.
# See https://packages.debian.org/search?keywords=tesseract-ocr-&searchon=names
# for available languages.
PAPERLESS_OCR_LANGUAGES=chi-tra
"""

[[stack]]
name = "octo-fiesta"

[stack.config]
server = "gamma"
run_directory = "compose/gamma/octo-fiesta"
linked_repo = "homelab"
file_paths = [ "compose.yml" ]
environment = """
###################################################################################
# octo-fiesta
###################################################################################

# Navidrome/Subsonic server URL
SUBSONIC_URL=http://navidrome:4533

# Admin username to perform actions on navidrome server that require admin permissions (optional)
SUBSONIC_ADMIN_USERNAME=admin

# Admin Password to perform actions on navidrome server that require admin permissions (optional)
# SUBSONIC_ADMIN_PASSWORD=

# Path where downloaded songs will be stored on the host (only applies if STORAGE_MODE=Permanent)
DOWNLOAD_PATH=$MEDIADIR/music

# Music service to use: Deezer, Qobuz, or SquidWTF (default: SquidWTF)
MUSIC_SERVICE=SquidWTF

# ===== DEEZER CONFIGURATION =====
# Deezer ARL token (required if using Deezer)
# See README.md for instructions on how to get this token
DEEZER_ARL=your-deezer-arl-token

# Fallback ARL token (optional)
DEEZER_ARL_FALLBACK=

# Preferred audio quality: FLAC, MP3_320, MP3_128 (optional)
# If not specified, the highest available quality for your account will be used
DEEZER_QUALITY=

# ===== QOBUZ CONFIGURATION =====
# Qobuz user authentication token (required if using Qobuz)
# Get this from your browser after logging into play.qobuz.com
# See README.md for detailed instructions
QOBUZ_USER_AUTH_TOKEN=

# Qobuz user ID (required if using Qobuz)
# Get this from your browser after logging into play.qobuz.com
QOBUZ_USER_ID=

# Preferred audio quality: FLAC, FLAC_24_HIGH, FLAC_24_LOW, FLAC_16, MP3_320 (optional)
# If not specified, the highest available quality will be used
QOBUZ_QUALITY=

# ===== SQUIDWTF CONFIGURATION =====
# SquidWTF is a music downloader service that supports Qobuz and Tidal backends
# No credentials required - this service provides free access to music

# Backend source: Qobuz or Tidal (default: Qobuz)
SQUIDWTF_SOURCE=Qobuz

# Preferred audio quality (optional)
# For Qobuz backend: 27 (FLAC 24-bit/192kHz), 7 (FLAC 24-bit/96kHz), 6 (FLAC 16-bit/44kHz), 5 (MP3 320kbps)
# For Tidal backend: HI_RES_LOSSLESS (FLAC 24-bit/192kHz), LOSSLESS (FLAC 16-bit/44kHz), HIGH (AAC 320kbps), LOW (AAC 96kbps)
# If not specified, the highest available quality will be used
SQUIDWTF_QUALITY=6

# Instance timeout in seconds (optional, default: 5)
# Only applies to Tidal backend, if an API instance doesn't respond within this time,
# automatically switches to the next available instance
SQUIDWTF_INSTANCE_TIMEOUT=5

# ===== YANDEX MUSIC CONFIGURATION =====
# OAuth token for API access.
# Obtained from browser #access_token fragment after authenticating on
# https://oauth.yandex.ru/authorize?response_type=token&client_id=23cabbbdc6cd418abb4b39c32c41195d
YANDEX_OAUTH_TOKEN=

# Preferred audio quality (optional)
# Default: FLAC (16-bit/44.1kHz)
# Available: AAC_64, MP3_192, AAC_192, AAC_256, MP3_320, FLAC
YANDEX_QUALITY=

# Language for the API responses.
# Curated playlists and some album titles will be translated into that language.
# Default: ru
# Available: en/uz/uk/us/ru/kk/hy
YANDEX_LANGUAGE=ru

# Some tracks are included in the API responses but are marked unavailable for listening
# This setting allows to show such tracks in search results, playlists and albums
# Default: false
# Available: true, false
YANDEX_INCLUDE_UNAVAILABLE_TRACKS=false


# ===== NETWORK SETTINGS =====
# Internal port the container listens on (optional, default: 8080)
# Change this if port 8080 conflicts with another container (e.g. when using network_mode: service:vpn)
INTERNAL_PORT=8080

# ===== GENERAL SETTINGS =====
# External playlists support (optional, default: true)
# When enabled, allows searching and downloading playlists from Deezer/Qobuz
# Starring a playlist triggers automatic download of all tracks and creates an M3U file
ENABLE_EXTERNAL_PLAYLISTS=true

# Playlists directory name (optional, default: playlists)
# M3U playlist files will be created in {DOWNLOAD_PATH}/{PLAYLISTS_DIRECTORY}/
PLAYLISTS_DIRECTORY=playlists

# Explicit content filter (optional, default: All)
# - All: Show all tracks (no filtering)
# - ExplicitOnly: Exclude clean/edited versions, keep original explicit content
# - CleanOnly: Only show clean content (naturally clean or edited versions)
# Note: This only works with Deezer, Qobuz doesn't expose explicit content flags
EXPLICIT_FILTER=All

# Download mode (optional, default: Track)
# - Track: Download only the played track
# - Album: When playing a track, download the entire album in background
#          The played track is downloaded first, remaining tracks are queued
DOWNLOAD_MODE=Track

# Storage mode (optional, default: Permanent)
# - Permanent: Files are saved to the library permanently and registered in Navidrome
# - Cache: Files are stored in /tmp and automatically cleaned up after CACHE_DURATION_HOURS
#          Not registered in Navidrome, ideal for streaming without library bloat
#          Note: On Linux/Docker, you can customize cache location by setting TMPDIR environment variable
STORAGE_MODE=Permanent

# Cache duration in hours (optional, default: 1)
# Files older than this duration will be automatically deleted when STORAGE_MODE=Cache
# Based on last access time (updated each time the file is streamed)
# Cache location: /tmp/octo-fiesta-cache (or $TMPDIR/octo-fiesta-cache if TMPDIR is set)
CACHE_DURATION_HOURS=1

# Auto upgrade quality (optional, default: false)
# When enabled, re-downloads existing tracks if higher quality is available
# Example: If you upgrade from Deezer Free (MP3) to Premium (FLAC), existing MP3 files
# will be automatically replaced with FLAC versions when accessed
AUTO_UPGRADE_QUALITY=false

# Folder template for organizing downloaded files (optional)
# Default: {artist}/{album}/{track} - {title}
# Available placeholders: {artist}, {album}, {title}, {track}, {disc}, {year}, {genre}, {quality}
# The last segment is the file name (extension is added automatically), slashes separate folder levels
# Examples:
#   {artist}/{album}/{track} - {title}
#   {artist}/[{year}] {album} ({quality})/{track} - {title}
#   {artist} - {year} - {album}/{disc}-{track} - {title}
FOLDER_TEMPLATE={artist}/{album}/{track} {title}

"""


