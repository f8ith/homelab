networks:
  internal:
    external: true

services:
  openbao:
    file:
      extends: ../common.yml
      service: core
    image: openbao/openbao:latest
    container_name: openbao
    networks:
      internal: {}
    cap_add:
      - IPC_LOCK
    environment:
      # Local config overrides file requirements for standard single-node container deployment
      BAO_LOCAL_CONFIG: |
        {
          "listener": {
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": "true"
            }
          },
          "storage": {
            "file": {
              "path": "/openbao/data"
            }
          },
          "ui": true
        }
    volumes:
      - $DATADIR/data/openbao/data:/openbao/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openbao.rule=Host(`openbao.${DOMAINNAME_1}`) || Host(`openbao.${DOCKER_HOST_NAME}.i.${DOMAINNAME_1}`)"
      - "traefik.http.routers.openbao.entrypoints=internalsecure"
      - "traefik.http.routers.openbao.service=openbao-svc"
      - "traefik.http.services.openbao-svc.loadbalancer.server.port=8200"
      - "traefik.docker.network=internal"
