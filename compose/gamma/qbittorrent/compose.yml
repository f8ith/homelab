networks:
  web:
    external: true
  internal:
    external: true
  qbittorrent:
    name: qbittorrent
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.93.0/24

services:
  qbittorrent:
    extends:
      file: ../common.yml
      service: app
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent
    networks:
      - internal
      - qbittorrent
    volumes:
      - $DATADIR/appdata/qbittorrent/config:/config
      - $MEDIADIR:/data
      - $MEDIADIR/@media:/data/media
      - /mnt:/mnt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent-rtr.entrypoints=websecure,internalsecure,internalsecure"
      - "traefik.http.routers.qbittorrent-rtr.rule=Host(`qbittorrent.${DOCKER_HOST_NAME}.i.$DOMAINNAME_1`) || Host(`qbittorrent.$DOMAINNAME_1`)"
      - "traefik.http.routers.qbittorrent-rtr.service=qbittorrent-svc"
      - "traefik.http.services.qbittorrent-svc.loadbalancer.server.port=8080"
      - "traefik.docker.network=internal"
      - "logging=alloy"
      - "logging_jobname=containerlogs"
