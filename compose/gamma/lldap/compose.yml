networks:
  web:
    external: true
  internal:
    external: true

services:
  lldap:
    image: nitnelave/lldap:stable
    networks:
      - internal
    ports:
      - "$INTERNAL_IP:3890:3890"
    volumes:
      - "$DATADIR/data/lldap:/data"
    environment:
      - UID=1000
      - GID=1000
      - LLDAP_JWT_SECRET=[[LLDAP_JWT_SECRET]]
      - LLDAP_LDAP_USER_PASS=[[LLDAP_LDAP_USER_PASS]]
      - LLDAP_LDAP_BASE_DN=dc=jamietong,dc=com  
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lldap-rtr.entrypoints=internalsecure"
      - "traefik.http.routers.lldap-rtr.rule=Host(`lldap.${DOCKER_HOST_NAME}.i.$DOMAINNAME_1`) || Host(`lldap.$DOMAINNAME_1`)"
      - "traefik.http.routers.lldap-rtr.service=lldap-svc"
      - "traefik.http.services.lldap-svc.loadbalancer.server.port=17170"
      - "traefik.docker.network=internal"
      - "logging=alloy"
      - "logging_jobname=containerlogs"
