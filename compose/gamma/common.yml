services:
  app:
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    env_file:
      - $CONFIGDIR/.env
    labels:
      - "logging=alloy"
      - "logging_jobname=containerlogs"
  core:
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    env_file:
      - $CONFIGDIR/.env
