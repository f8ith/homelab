services:
  app:
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      UID: ${UID}
      GID: ${GID}
      TZ: ${TZ}
    labels:
      - "logging=alloy"
      - "logging_jobname=containerlogs"
  core:
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      UID: ${UID}
      GID: ${GID}
      TZ: ${TZ}
    labels:
      - "logging=alloy"
      - "logging_jobname=containerlogs"
