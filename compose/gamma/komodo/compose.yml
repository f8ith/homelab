networks:
  web:
    external: true
  internal:
    external: true

networks:
  komodo:
    driver: bridge 
  internal:
    external: true

services:
  komodo-postgres:
    extends:
       file: ../common.yml
       service: core
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
    container_name: komodo-postgres
    labels:
      komodo.skip:
    networks:
      komodo: {}
    volumes:
      - $DATADIR/data/komodo-postgres/data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KOMODO_DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${KOMODO_DATABASE_PASSWORD}
      POSTGRES_DB: postgres

  ferretdb:
    extends:
      file: ../common.yml
      service: core
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    container_name: ferretdb
    labels:
      komodo.skip: # Prevent Komodo from stopping with StopAllContainers
    depends_on:
      - komodo-postgres
    networks:
      komodo: {}
    volumes:
      - ferretdb-state:/state
    environment:
      FERRETDB_POSTGRESQL_URL: "postgres://${KOMODO_DATABASE_USERNAME}:${KOMODO_DATABASE_PASSWORD}@komodo-postgres:5432/postgres"

  komodo-core:
    extends:
      file: ../common.yml
      service: core
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-2}
    init: true
    container_name: komodo-core
    depends_on:
      - ferretdb
    networks:
      komodo: {}
      internal: {}
    env_file: ./komodo.env
    environment:
      KOMODO_DATABASE_ADDRESS: "ferretdb:27017"
      KOMODO_DATABASE_USERNAME: "${KOMODO_DATABASE_USERNAME}"
      KOMODO_DATABASE_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
    volumes:
      ## Attach the Core / Periphery communication keys
      - keys:/config/keys
      ## Store dated backups of the database - https://komo.do/docs/setup/backup
      - ${COMPOSE_KOMODO_BACKUPS_PATH}:/backups
      ## Store sync files on server
      # - /path/to/syncs:/syncs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komodo-rtr.entrypoints=internalsecure"
      - "traefik.http.routers.komodo-rtr.rule=Host(`komodo.${DOCKER_HOST_NAME}.i.$DOMAINNAME_1`)"
      - "traefik.http.routers.komodo-rtr.service=komodo-svc"
      - "traefik.http.services.komodo-svc.loadbalancer.server.port=9120"
      - "traefik.docker.network=internal"

volumes:
  ferretdb-state:
  # Core / Periphery
  keys:
